<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>

    <!-- Link of Font and Icons -->
       <script src="https://kit.fontawesome.com/7f2fc51bc6.js" crossorigin="anonymous"></script>

       <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">

       <link rel="stylesheet" href="style/style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

</head>
<body>
    
    <!-- Start Header Section -->
    <header>
    <nav>
      <div>
        <!-- Logo -->
         <img src="images/logo.png.png" alt="Logo" width="180px" height="70px">
        </div>

         <!-- Menu -->
          <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="bitedeals.html">BiteDeals</a></li>
            <li><a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
            <li><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i>Login</a></li>
          </ul>
      
    </nav>
  </header>
<!-- End header section -->

<!-- Start Cart Section -->

    <section class="cart">

        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>

            <tbody>
                <tr>
                    <td class="item">
                        <img src="images/burger-card1.png">
                        <div>
                            <h4>Cheese Burger</h4>
                            <p>Juicey grilled</p>
                        </div>
                    </td>
                    <td>₹199</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>₹199</td>
                    <td><i class="fa-solid fa-trash"></i></td>
                </tr>

                <tr class="grand-total">
                    <td colspan="3">Grand Total</td>
                    <td>₹199</td>
                    <td><button>Proceed</button></td>                    
                </tr>

                
            </tbody>
        </table>

    </section>


<!-- End Cart Section -->
    </header>
</body>
</html>
